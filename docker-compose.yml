services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: securyentry-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-logs:
